<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Login - SmartStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/mobile.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#5d3bb2">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
    <div class="login-container">
        <div class="login-box animate-fade-in">
            <div class="logo-icon" style="margin: 0 auto 1.5rem auto; width: 60px; height: 60px;">
                <img src="/icon-192.png" alt="SmartStock logo" width="60" height="60">
            </div>
            <h1>Welcome Back</h1>
            <p>Login to your SmartStock Dashboard</p>
            
            <form id="loginForm">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
                </button>
            </form>
            


            <div id="error-message" style="color: var(--danger); margin-top: 1rem; display: none;">
                Invalid credentials. Please try again.
            </div>
        </div>
    </div>

    <script type="module" src="src/js/auth.js"></script>
    <!-- PWA Registration -->
    <script type="module" src="src/js/pwa.js"></script>
</body>
</html>
