<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Set New Password - SmartStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/mobile.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box animate-fade-in">
            <div class="logo-icon" style="margin: 0 auto 1.5rem auto; width: 60px; height: 60px; font-size: 2rem;">
                <i class="fas fa-fire"></i>
            </div>
            <h1>Set New Password</h1>
            <p id="reset-subtitle">Please enter your new password below.</p>
            
            <form id="resetPasswordForm">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="new_password">New Password</label>
                    <input type="password" id="new_password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Update Password <i class="fas fa-check" style="margin-left: 0.5rem;"></i>
                </button>
            </form>

            <div id="success-message" style="color: var(--success); margin-top: 1rem; display: none;">
                Password updated successfully. Redirecting...
            </div>
            <div id="error-message" style="color: var(--danger); margin-top: 1rem; display: none;">
                An error occurred.
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './src/js/auth.js';
        
        document.addEventListener("DOMContentLoaded", async () => {
            // Supabase automatically parses #access_token=...&type=recovery into the session.
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                // Not authenticated at all, can't reset password.
                window.location.href = '/';
                return;
            }

            const isForcedReset = session.user.user_metadata?.must_change_password === true;
            if (isForcedReset) {
                document.getElementById('reset-subtitle').textContent = "You must change your password before continuing.";
            }

            const form = document.getElementById('resetPasswordForm');
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const submitBtn = form.querySelector('button');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                
                const newPassword = document.getElementById('new_password').value;
                const confirmPassword = document.getElementById('confirm_password').value;

                if (newPassword !== confirmPassword) {
                    errorMsg.textContent = "Passwords do not match.";
                    errorMsg.style.display = 'block';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

                // 1. Update the password
                const { error: updateError } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (updateError) {
                    let displayMsg = updateError.message;
                    if (displayMsg.includes("Password should contain at least one character of each")) {
                        displayMsg = "Password must contain at least one uppercase letter, one lowercase letter, one number, and one special character.";
                    }
                    errorMsg.textContent = displayMsg;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Update Password <i class="fas fa-check" style="margin-left: 0.5rem;"></i>';
                    return;
                }

                // 2. If it was a forced reset, clear the flag
                if (isForcedReset) {
                    const { error: metaError } = await supabase.auth.updateUser({
                        data: { must_change_password: false }
                    });
                    if (metaError) {
                        console.error("Failed to clear must_change_password flag", metaError);
                        // Continue anyway, they changed the password. We can retry later if needed.
                    }
                }

                // 3. Success, redirect to dashboard or login
                successMsg.style.display = 'block';
                setTimeout(() => {
                    // Check authentication will route them properly
                    window.location.href = '/'; 
                }, 1500);
            });
        });

        // Supabase fires this when the recovery link is clicked
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === "PASSWORD_RECOVERY") {
                console.log("PASSWORD_RECOVERY event received");
                // The session is established, so the user can just fill the form now.
            }
        });
    </script>
</body>
</html>
